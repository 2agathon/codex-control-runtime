<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-labelledby="title desc">
  <title id="title">Five runtime gates</title>
  <desc id="desc">Five connected gates from availability to strict acceptance.</desc>
  <rect width="640" height="220" rx="28" fill="#0f1f2e"/>
  <path d="M82 110h476" stroke="#88b9b0" stroke-width="6" stroke-linecap="round"/>
  <g fill="#e5b567" stroke="#0f1f2e" stroke-width="8">
    <circle cx="82" cy="110" r="34"/><circle cx="201" cy="110" r="34"/>
    <circle cx="320" cy="110" r="34"/><circle cx="439" cy="110" r="34"/>
    <circle cx="558" cy="110" r="34"/>
  </g>
  <g fill="#f7f3e8" font-family="Segoe UI, sans-serif" font-size="15" text-anchor="middle">
    <text x="82" y="56">AVAILABLE</text><text x="201" y="56">INJECTED</text>
    <text x="320" y="56">TRUSTED</text><text x="439" y="56">BRIDGED</text>
    <text x="558" y="56">VERIFIED</text>
  </g>
  <g fill="#0f1f2e" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    <text x="82" y="116">1</text><text x="201" y="116">2</text><text x="320" y="116">3</text>
    <text x="439" y="116">4</text><text x="558" y="116">5</text>
  </g>
  <text x="320" y="184" fill="#b9c9d4" font-family="Segoe UI, sans-serif" font-size="16" text-anchor="middle">Installed is not callable. Connected is not verified.</text>
</svg>
