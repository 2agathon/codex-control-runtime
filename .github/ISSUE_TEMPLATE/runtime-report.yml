name: Sanitized runtime report
description: Contribute a versioned Browser, Chrome, or Computer Use observation.
title: "[runtime-report]: "
labels:
  - runtime-report
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing evidence. Do not include tokens, cookies, private tab content, machine names, SIDs, or an unreviewed raw snapshot.
  - type: dropdown
    id: capability
    attributes:
      label: Capability
      options:
        - Browser (in-app)
        - Chrome extension
        - Computer Use
        - Multiple capabilities
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Codex or ChatGPT desktop app version
      placeholder: 26.xxx.xxxxx
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Bundled plugin version
      placeholder: 26.xxx.xxxxx
    validations:
      required: true
  - type: dropdown
    id: doctor-result
    attributes:
      label: Doctor result
      options:
        - PASS
        - ATTENTION
        - FAIL
        - Not run
    validations:
      required: true
  - type: textarea
    id: first-error
    attributes:
      label: First raw error or first failed check
      description: Preserve the earliest observed failure. Remove private paths and identifiers.
      render: text
    validations:
      required: true
  - type: dropdown
    id: fallback
    attributes:
      label: Was a fallback used?
      options:
        - "No"
        - "Yes - visible action succeeded through another tool"
        - Unknown
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Strict acceptance evidence
      description: Include server/tool, bundled client suffix, backend/runtime, read-only operation, and result when available.
      render: text
  - type: textarea
    id: public-snapshot
    attributes:
      label: Sanitized snapshot or supporting log excerpt
      description: Drag only a reviewed .public.json file here, or paste a short redacted excerpt.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I reviewed the material and removed machine names, SIDs, tokens, cookies, private tab data, and private organization names.
          required: true
        - label: I understand that a settings screenshot alone is not strict acceptance evidence.
          required: true
