name: Runtime Guard tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PowerShell tests
        shell: pwsh
        run: ./tests/Test-CodexRuntimeGuard.ps1
